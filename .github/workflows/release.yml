name: Release Windows build

# Tag push (v*) -> build PolyG_DLL_API on a Windows runner -> package the
# standalone zip -> publish a GitHub Release with the zip attached and a
# Changelog (commit subjects since the previous v* tag) appended to the notes.
#
# Manual runs (workflow_dispatch) build + package and upload the zip as a
# workflow artifact only (no Release is created), so you can test packaging
# without cutting a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write          # required to create the Release and upload assets

env:
  CONFIGURATION: Release
  PLATFORM: x64
  # The project's PlatformToolset is v145, but GitHub-hosted windows-2022 ships
  # VS 2022 (v143). Override to the toolset present on the runner; the linkage
  # (dynamic MFC + /MD) is per-config and unaffected.
  #
  # NOTE: the app is app-local deployed (runtime DLLs bundled by package.ps1), not
  # statically linked. The runner's System32 has the VS2015-2022 DLLs but NOT the
  # VS2010 ones (mfc100 / msvcr100) that ACQPLOT.dll needs, so a CI-built zip is
  # INCOMPLETE unless those two DLLs are vendored in release/runtime/ (see its README).
  TOOLSET: v143

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, so the changelog can diff tag-to-tag

      # Puts msbuild on PATH (full MSVC dev environment).
      # Official alternative: microsoft/setup-msbuild@v2 (msbuild only) works too.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build (Release|x64)
        shell: pwsh
        run: |
          msbuild PolyG_DLL_API\Test_LXSM_D1WD10.vcxproj /p:Configuration=$env:CONFIGURATION /p:Platform=$env:PLATFORM /p:PlatformToolset=$env:TOOLSET /m /nologo /v:minimal
          if ($LASTEXITCODE -ne 0) { throw "msbuild failed ($LASTEXITCODE)" }

      - name: Package zip
        id: pkg
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "dev-" + $env:GITHUB_SHA.Substring(0,7) }
          ./release/package.ps1 -Version $tag
          $zip = "PolyG_DLL_API-$tag-win-x64.zip"
          if (-not (Test-Path $zip)) { throw "expected package not found: $zip" }
          "tag=$tag"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip=$zip"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.zip }}
          path: ${{ steps.pkg.outputs.zip }}
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Decode git's UTF-8 output correctly (commit subjects may contain Korean).
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $tag = $env:GITHUB_REF_NAME

          # Previous release tag reachable from this tag (newest v* before $tag).
          $prev = git tag --list 'v*' --sort=-v:refname --merged $tag |
                  Where-Object { $_ -ne $tag } | Select-Object -First 1

          # Commit subjects in the range, as a Markdown bullet list.
          $range = if ($prev) { "$prev..$tag" } else { $tag }
          $commits = (git log $range --no-merges --pretty=format:'- %s (%h)') -join "`n"
          if ([string]::IsNullOrWhiteSpace($commits)) { $commits = "- (no changes)" }

          # Static notes (UTF-8) + an appended Changelog section.
          $body  = (Get-Content release/RELEASE_NOTES.md -Raw).TrimEnd()
          $body += "`n`n## Changelog`n`n"
          if ($prev) { $body += "Changes since ${prev}:`n`n" }
          $body += $commits + "`n"
          if ($prev) {
            $body += "`n**Full Changelog:** https://github.com/$env:GITHUB_REPOSITORY/compare/$prev...$tag`n"
          }

          $notes = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notes -Value $body -Encoding utf8

          gh release create "$tag" "${{ steps.pkg.outputs.zip }}" --title "PolyG_DLL_API $tag" --notes-file $notes
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed ($LASTEXITCODE)" }
